name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --frozen

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format check
        run: uv run ruff format --check .

      - name: pytest (CI default — live 제외)
        run: uv run pytest tests/ -m "not live" --cov=app --cov-report=term

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: p2p-monitor:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — image runs and serves /api/health
        run: |
          docker run -d --name p2p-ci -p 8080:8080 \
            -e SERVER_A_HOST=127.0.0.1 \
            -e SERVER_B_HOST=127.0.0.1 \
            -e SERVER_A_RDMA_IP=127.0.0.1 \
            -e SERVER_B_RDMA_IP=127.0.0.1 \
            -e SSH_KEY_PATH=/tmp/dummy_key \
            -e SSH_KNOWN_HOSTS=/tmp/dummy_known \
            -e MEASUREMENT_TOOL=mock \
            p2p-monitor:ci
          for i in $(seq 1 30); do
            if curl -fsS --max-time 2 http://127.0.0.1:8080/api/health >/dev/null; then
              echo "health OK"; docker logs p2p-ci | tail -20; exit 0
            fi
            sleep 1
          done
          echo "health timeout"; docker logs p2p-ci; exit 1
