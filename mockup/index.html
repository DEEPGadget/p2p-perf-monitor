<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>P2P Perf Monitor — Mockup</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface-2: #1c1c1c;
    --border: #262626;
    --text: #ffffff;
    --text-2: #e5e5e5;
    --muted: #a1a1aa;
    --accent: #00d9ff;
    --accent-2: #00aacc;
    --success: #22c55e;
    --warning: #f59e0b;
    --danger: #ef4444;

    --font-sans: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
    --font-mono: 'JetBrains Mono', 'SF Mono', 'Consolas', 'Menlo', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ─── HEADER ─── */
  header {
    height: 64px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    flex-shrink: 0;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo {
    width: 32px; height: 32px;
    border-radius: 6px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
    display: flex; align-items: center; justify-content: center;
    color: var(--bg); font-weight: 800; font-size: 14px;
  }
  .brand-text {
    display: flex; align-items: center; gap: 12px;
    font-weight: 700; font-size: 16px; letter-spacing: 0.05em;
  }
  .brand-text .sep { color: var(--muted); font-weight: 400; }
  .brand-text .title { color: var(--text-2); font-weight: 500; letter-spacing: 0.1em; }

  .header-right {
    display: flex; align-items: center; gap: 20px;
  }
  .clock {
    font-family: var(--font-mono); font-size: 14px; color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* ─── STATUS BADGE ─── */
  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 999px;
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.1em;
    color: var(--muted);
    transition: all 0.3s ease;
  }
  .badge .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted);
    transition: all 0.3s ease;
  }
  .badge.running {
    border-color: var(--accent);
    color: var(--accent);
    animation: pulse-glow 1.4s ease-in-out infinite;
  }
  .badge.running .dot {
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
  }
  .badge.error {
    border-color: var(--danger);
    color: var(--danger);
  }
  .badge.error .dot { background: var(--danger); }
  .badge.connecting {
    border-color: var(--warning);
    color: var(--warning);
  }
  .badge.connecting .dot { background: var(--warning); }

  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(0, 217, 255, 0.4); }
    50%      { box-shadow: 0 0 24px 4px rgba(0, 217, 255, 0.4); }
  }

  /* ─── MAIN ─── */
  main {
    flex: 1;
    display: grid;
    grid-template-rows: 200px 240px 1fr 80px;
    gap: 24px;
    padding: 24px 48px;
    overflow: hidden;
  }

  /* ─── HARDWARE DIAGRAM ─── */
  .hardware {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    position: relative;
    overflow: hidden;
    padding: 24px;
  }
  .hardware-svg {
    width: 100%; height: 100%;
    overflow: visible;
  }
  .server-box {
    fill: var(--surface-2);
    stroke: var(--border);
    stroke-width: 1;
    rx: 8;
  }
  .server-label {
    fill: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.1em;
  }
  .server-sub {
    fill: var(--muted);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.05em;
  }
  .nic-label {
    fill: var(--accent);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.1em;
  }
  .link-line {
    stroke: var(--border);
    stroke-width: 2;
    stroke-linecap: round;
  }
  .link-label {
    fill: var(--muted);
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .packet-dot {
    fill: var(--accent);
    filter: drop-shadow(0 0 4px var(--accent));
  }
  .cpu-ram-box {
    fill: var(--bg);
    stroke: var(--border);
    stroke-width: 1;
    rx: 3;
  }
  .cpu-ram-text {
    fill: var(--muted);
    font-family: var(--font-mono);
    font-size: 8px;
    letter-spacing: 0.05em;
  }

  /* ─── KPI CARDS ─── */
  .kpi {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 24px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 32px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s ease, box-shadow 0.4s ease;
  }
  .card.hot {
    border-color: var(--accent);
    box-shadow: 0 0 32px rgba(0, 217, 255, 0.25);
  }
  .card-label {
    font-size: 13px;
    color: var(--text-2);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 700;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .card-label::before {
    content: '';
    width: 4px;
    height: 14px;
    background: var(--accent);
    border-radius: 2px;
    box-shadow: 0 0 8px var(--accent);
  }
  .card-value-row {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-top: auto;
  }
  .card-value {
    font-family: var(--font-mono);
    font-size: 88px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.04em;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  .card-unit {
    font-family: var(--font-mono);
    font-size: 22px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  .card-bg {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 80% 20%, rgba(0, 217, 255, 0.05) 0%, transparent 50%);
    pointer-events: none;
  }

  /* ─── CHART ─── */
  .chart-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .chart-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px;
  }
  .chart-title {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .chart-live {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--font-mono); font-size: 12px;
    color: var(--accent); letter-spacing: 0.1em;
  }
  .chart-live .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: blink 1.4s ease-in-out infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  #chart {
    flex: 1;
    min-height: 0;
  }

  /* ─── CONTROL ─── */
  .control {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
  }
  .control-group {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 16px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    transition: border-color 0.2s ease;
    cursor: pointer;
  }
  .control-group:hover { border-color: var(--accent); }
  .control-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .control-value {
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--text);
    font-weight: 500;
  }
  .control-arrow {
    color: var(--muted);
    font-size: 10px;
    margin-left: 4px;
  }
  .control-spacer { flex: 1; }
  .btn-action {
    padding: 12px 36px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 10px;
    font-family: var(--font-mono);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .btn-action:hover {
    box-shadow: 0 0 24px rgba(0, 217, 255, 0.5);
    transform: translateY(-1px);
  }
  .btn-action:active {
    transform: translateY(0);
  }
  .btn-action.stop {
    background: var(--danger);
  }
  .btn-action.stop:hover {
    box-shadow: 0 0 24px rgba(239, 68, 68, 0.5);
  }
  .control-group.disabled {
    opacity: 0.5;
    pointer-events: none;
  }

  /* ─── FOOTER ─── */
  footer {
    height: 32px;
    flex-shrink: 0;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    font-size: 11px;
    color: var(--muted);
    font-family: var(--font-mono);
    letter-spacing: 0.05em;
  }
  footer .meta { display: flex; gap: 16px; }
  footer .meta span { color: var(--muted); }
  footer .demo-warning {
    color: var(--warning);
    font-weight: 700;
    letter-spacing: 0.15em;
  }

  /* ─── 200G PEAK GLOW ─── */
  .peak-vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    box-shadow: inset 0 0 200px rgba(0, 217, 255, 0.15);
    opacity: 0;
    transition: opacity 0.5s ease;
    z-index: 9;
  }
  .peak-vignette.on {
    opacity: 1;
  }
</style>
</head>
<body>
<div class="peak-vignette" id="vignette"></div>

<header>
  <div class="brand">
    <div class="logo">DG</div>
    <div class="brand-text">
      <span>DEEPGADGET</span>
      <span class="sep">·</span>
      <span class="title">P2P PERF MONITOR</span>
    </div>
  </div>
  <div class="header-right">
    <div class="badge" id="badge">
      <span class="dot"></span>
      <span class="text">IDLE</span>
    </div>
    <div class="clock" id="clock">--:--:--</div>
  </div>
</header>

<main>

  <!-- ─── HARDWARE DIAGRAM ─── -->
  <section class="hardware">
    <svg class="hardware-svg" viewBox="0 0 1200 160" preserveAspectRatio="xMidYMid meet">
      <!-- Server A -->
      <rect class="server-box" x="120" y="20" width="220" height="120" />
      <text class="server-label" x="230" y="50" text-anchor="middle">SERVER A</text>
      <!-- CPU/RAM mini boxes -->
      <rect class="cpu-ram-box" x="140" y="65" width="50" height="22" />
      <text class="cpu-ram-text" x="165" y="79" text-anchor="middle">CPU</text>
      <rect class="cpu-ram-box" x="200" y="65" width="50" height="22" />
      <text class="cpu-ram-text" x="225" y="79" text-anchor="middle">RAM</text>
      <rect class="cpu-ram-box" x="260" y="65" width="60" height="22" />
      <text class="cpu-ram-text" x="290" y="79" text-anchor="middle">PCIe5</text>
      <!-- NIC indicator -->
      <rect x="155" y="100" width="150" height="30" rx="4"
            fill="var(--bg)" stroke="var(--accent)" stroke-width="1" opacity="0.6"/>
      <text class="nic-label" x="230" y="120" text-anchor="middle">CX-7 · mlx5_0</text>

      <!-- Server B -->
      <rect class="server-box" x="860" y="20" width="220" height="120" />
      <text class="server-label" x="970" y="50" text-anchor="middle">SERVER B</text>
      <rect class="cpu-ram-box" x="880" y="65" width="50" height="22" />
      <text class="cpu-ram-text" x="905" y="79" text-anchor="middle">CPU</text>
      <rect class="cpu-ram-box" x="940" y="65" width="50" height="22" />
      <text class="cpu-ram-text" x="965" y="79" text-anchor="middle">RAM</text>
      <rect class="cpu-ram-box" x="1000" y="65" width="60" height="22" />
      <text class="cpu-ram-text" x="1030" y="79" text-anchor="middle">PCIe5</text>
      <rect x="895" y="100" width="150" height="30" rx="4"
            fill="var(--bg)" stroke="var(--accent)" stroke-width="1" opacity="0.6"/>
      <text class="nic-label" x="970" y="120" text-anchor="middle">CX-7 · mlx5_0</text>

      <!-- Connection lines (bidir = two lines, uni = one) -->
      <line class="link-line" x1="340" y1="115" x2="860" y2="115" id="link-up" />
      <line class="link-line" x1="340" y1="125" x2="860" y2="125" id="link-down" style="visibility: hidden;" />
      <text class="link-label" x="600" y="100" id="link-label" text-anchor="middle">200G RoCE v2 · MTU 9000</text>

      <!-- Packet dots (animated via JS) -->
      <g id="packets"></g>
    </svg>
  </section>

  <!-- ─── KPI CARDS ─── -->
  <section class="kpi">
    <div class="card" id="card-now">
      <div class="card-bg"></div>
      <div class="card-label">CURRENT BANDWIDTH</div>
      <div class="card-value-row">
        <div class="card-value" id="kpi-now">0.0</div>
        <div class="card-unit">Gb/s</div>
      </div>
    </div>
    <div class="card">
      <div class="card-bg"></div>
      <div class="card-label">AVERAGE</div>
      <div class="card-value-row">
        <div class="card-value" id="kpi-avg">0.0</div>
        <div class="card-unit">Gb/s</div>
      </div>
    </div>
    <div class="card">
      <div class="card-bg"></div>
      <div class="card-label">PEAK</div>
      <div class="card-value-row">
        <div class="card-value" id="kpi-peak">0.0</div>
        <div class="card-unit">Gb/s</div>
      </div>
    </div>
    <div class="card">
      <div class="card-bg"></div>
      <div class="card-label">LATENCY</div>
      <div class="card-value-row">
        <div class="card-value" id="kpi-lat">─</div>
        <div class="card-unit">µs</div>
      </div>
    </div>
  </section>

  <!-- ─── MAIN CHART ─── -->
  <section class="chart-wrap">
    <div class="chart-header">
      <div class="chart-title">BANDWIDTH (Gb/s) — LAST 60s</div>
      <div class="chart-live" id="chart-live" style="opacity: 0;">
        <span class="dot"></span>
        <span>LIVE</span>
      </div>
    </div>
    <div id="chart"></div>
  </section>

  <!-- ─── CONTROL ─── -->
  <section class="control">
    <div class="control-group" id="cg-tool">
      <div>
        <div class="control-label">TOOL</div>
        <div class="control-value" id="val-tool">ib_write_bw</div>
      </div>
      <span class="control-arrow">▾</span>
    </div>
    <div class="control-group" id="cg-size">
      <div>
        <div class="control-label">MSG SIZE</div>
        <div class="control-value" id="val-size">64K</div>
      </div>
      <span class="control-arrow">▾</span>
    </div>
    <div class="control-group" id="cg-duration">
      <div>
        <div class="control-label">DURATION</div>
        <div class="control-value" id="val-duration">60s</div>
      </div>
      <span class="control-arrow">▾</span>
    </div>
    <div class="control-group" id="cg-bidir">
      <div>
        <div class="control-label">DIRECTION</div>
        <div class="control-value" id="val-bidir">UNI</div>
      </div>
      <span class="control-arrow">▾</span>
    </div>
    <div class="control-spacer"></div>
    <button class="btn-action" id="btn-action">
      <span id="btn-icon">▶</span>
      <span id="btn-text">START</span>
    </button>
  </section>

</main>

<footer>
  <div class="meta">
    <span>NIC mlx5_0</span>
    <span>·</span>
    <span>MLNX_OFED 24.10</span>
    <span>·</span>
    <span>RoCE v2</span>
    <span>·</span>
    <span>MTU 9000</span>
  </div>
  <div class="meta">
    <span class="demo-warning">DEMO MODE</span>
    <span>·</span>
    <span>v0.1 mockup</span>
  </div>
</footer>

<script>
/* ───────────── State ───────────── */
const state = {
  running: false,
  data: [],            // bandwidth values (last 600 points = 60s @ 10Hz)
  startTime: null,
  intervalId: null,
  packetTl: null,
  hotTimeout: null,
  config: {
    tool: 'ib_write_bw',
    msgSize: '64K',
    duration: 60,
    bidir: false,
  },
};

/* ───────────── Mock generator ─────────────
   200G ConnectX-7 RoCE: avg ~187, peak ~198, with sine wave + gaussian noise.
*/
function generateBwSample(elapsedSec, bidir) {
  const baseAvg = bidir ? 374 : 187;       // bidir = 양방향 합산 BW
  const amplitude = bidir ? 14 : 8;
  const cap = bidir ? 396 : 199;
  const periodSec = 30;
  const sine = Math.sin((elapsedSec / periodSec) * 2 * Math.PI) * amplitude;
  const noise = (Math.random() + Math.random() + Math.random() - 1.5) * (bidir ? 2.5 : 1.5);
  const bw = Math.max(0, baseAvg + sine + noise);
  return Math.min(cap, bw);
}
function generateLatSample() {
  return 1.5 + Math.random() * 0.5;
}

/* ───────────── Chart ───────────── */
const chartDom = document.getElementById('chart');
const chart = echarts.init(chartDom, null, { renderer: 'canvas' });

const baseChartOption = {
  animation: false,
  grid: { left: 50, right: 16, top: 16, bottom: 32 },
  xAxis: {
    type: 'category',
    data: [],
    axisLabel: {
      color: '#a1a1aa',
      fontFamily: 'JetBrains Mono, monospace',
      fontSize: 11,
    },
    axisLine: { lineStyle: { color: '#262626' } },
    axisTick: { show: false },
  },
  yAxis: {
    type: 'value',
    min: 0,
    max: 200,
    interval: 50,
    axisLabel: {
      color: '#a1a1aa',
      fontFamily: 'JetBrains Mono, monospace',
      fontSize: 11,
      formatter: '{value}',
    },
    axisLine: { show: false },
    axisTick: { show: false },
    splitLine: { lineStyle: { color: '#1c1c1c' } },
  },
  tooltip: {
    trigger: 'axis',
    backgroundColor: '#141414',
    borderColor: '#262626',
    textStyle: { color: '#ffffff', fontFamily: 'JetBrains Mono, monospace' },
    formatter: (params) => {
      const v = params[0].value;
      return `<div style="font-size:11px;color:#a1a1aa">${params[0].axisValue}</div>` +
             `<div style="font-size:14px;color:#00d9ff;font-weight:700">${v.toFixed(2)} Gb/s</div>`;
    },
  },
  series: [{
    type: 'line',
    data: [],
    smooth: false,
    symbol: 'none',
    lineStyle: { color: '#00d9ff', width: 2.5, shadowColor: '#00d9ff', shadowBlur: 8 },
    areaStyle: {
      color: {
        type: 'linear',
        x: 0, y: 0, x2: 0, y2: 1,
        colorStops: [
          { offset: 0, color: 'rgba(0, 217, 255, 0.35)' },
          { offset: 1, color: 'rgba(0, 217, 255, 0)' },
        ],
      },
    },
  }],
};

chart.setOption(baseChartOption);
window.addEventListener('resize', () => chart.resize());

function pushData(bw) {
  const elapsed = (Date.now() - state.startTime) / 1000;
  const label = `${elapsed.toFixed(0)}s`;
  state.data.push({ label, value: bw });
  if (state.data.length > 600) state.data.shift();

  chart.setOption({
    xAxis: { data: state.data.map(d => d.label) },
    series: [{ data: state.data.map(d => d.value) }],
  }, { lazyUpdate: true });
}

/* ───────────── KPI updaters with GSAP counters ───────────── */
const kpiNow = document.getElementById('kpi-now');
const kpiAvg = document.getElementById('kpi-avg');
const kpiPeak = document.getElementById('kpi-peak');
const kpiLat = document.getElementById('kpi-lat');

let kpiState = { now: 0, avg: 0, peak: 0, lat: null };

function tweenNumber(el, from, to, decimals = 1) {
  const obj = { v: from };
  gsap.to(obj, {
    v: to,
    duration: 0.4,
    ease: 'power2.out',
    onUpdate: () => { el.textContent = obj.v.toFixed(decimals); },
  });
}

function updateKpis(bw, lat) {
  // NOW
  tweenNumber(kpiNow, kpiState.now, bw, 1);
  kpiState.now = bw;

  // AVG (running average over data window)
  const sum = state.data.reduce((a, d) => a + d.value, 0);
  const avg = state.data.length > 0 ? sum / state.data.length : bw;
  tweenNumber(kpiAvg, kpiState.avg, avg, 1);
  kpiState.avg = avg;

  // PEAK
  const peak = Math.max(kpiState.peak, bw);
  if (peak > kpiState.peak) tweenNumber(kpiPeak, kpiState.peak, peak, 1);
  kpiState.peak = peak;

  // LAT
  if (lat !== null) {
    tweenNumber(kpiLat, kpiState.lat ?? lat, lat, 2);
    kpiState.lat = lat;
  }

  // Hot effect (95% NIC theoretical peak — uni: 200G, bidir: 400G)
  const peakThreshold = state.config.bidir ? 380 : 195;
  if (bw >= peakThreshold) {
    triggerHot();
  }
}

const cardNow = document.getElementById('card-now');
const vignette = document.getElementById('vignette');
function triggerHot() {
  if (state.hotTimeout) return;
  cardNow.classList.add('hot');
  vignette.classList.add('on');
  state.hotTimeout = setTimeout(() => {
    cardNow.classList.remove('hot');
    vignette.classList.remove('on');
    state.hotTimeout = null;
  }, 1500);
}

/* ───────────── Packet flow animation ───────────── */
const packetsGroup = document.getElementById('packets');

function createDot(cyValue, fromX, toX, delay) {
  const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  dot.setAttribute('class', 'packet-dot');
  dot.setAttribute('r', '4');
  dot.setAttribute('cy', cyValue);
  dot.setAttribute('cx', fromX);
  dot.setAttribute('opacity', '0');
  packetsGroup.appendChild(dot);

  gsap.to(dot, {
    attr: { cx: toX },
    opacity: 1,
    duration: 1.5,
    delay,
    repeat: -1,
    ease: 'none',
    onRepeat: () => { gsap.set(dot, { attr: { cx: fromX } }); },
  });
  gsap.to(dot, {
    opacity: 0,
    duration: 0.3,
    delay: delay + 1.2,
    repeat: -1,
  });
}

function startPacketFlow() {
  if (state.config.bidir) {
    // 두 라인 모두 활성: 위 (A→B), 아래 (B→A)
    for (let i = 0; i < 6; i++) {
      createDot(105, 340, 860, i * 0.25);
      createDot(125, 860, 340, i * 0.25 + 0.125);
    }
    gsap.to(['#link-up', '#link-down'], {
      attr: { 'stroke-width': 3 },
      css: { stroke: '#00d9ff' },
      duration: 0.4,
    });
  } else {
    // 단일 라인 (중앙)
    for (let i = 0; i < 6; i++) {
      createDot(115, 340, 860, i * 0.25);
    }
    gsap.to('#link-up', {
      attr: { 'stroke-width': 3 },
      css: { stroke: '#00d9ff' },
      duration: 0.4,
    });
  }
}

function stopPacketFlow() {
  gsap.killTweensOf('.packet-dot');
  packetsGroup.innerHTML = '';
  gsap.to(['#link-up', '#link-down'], {
    attr: { 'stroke-width': 2 },
    css: { stroke: '#262626' },
    duration: 0.4,
  });
}

function setBidir(on) {
  state.config.bidir = on;
  document.getElementById('val-bidir').textContent = on ? 'BIDIR' : 'UNI';
  const linkUp = document.getElementById('link-up');
  const linkDown = document.getElementById('link-down');
  const linkLabel = document.getElementById('link-label');
  if (on) {
    linkUp.setAttribute('y1', '105'); linkUp.setAttribute('y2', '105');
    linkDown.setAttribute('y1', '125'); linkDown.setAttribute('y2', '125');
    linkDown.style.visibility = '';
    linkLabel.setAttribute('y', '85');
  } else {
    linkUp.setAttribute('y1', '115'); linkUp.setAttribute('y2', '115');
    linkDown.style.visibility = 'hidden';
    linkLabel.setAttribute('y', '100');
  }
  // 차트 Y축 max 동적 조정
  chart.setOption({ yAxis: { max: on ? 400 : 200, interval: on ? 100 : 50 } });
}

/* ───────────── Status badge ───────────── */
const badge = document.getElementById('badge');
function setBadge(stateName) {
  badge.classList.remove('running', 'error', 'connecting');
  const text = badge.querySelector('.text');
  if (stateName === 'running') {
    badge.classList.add('running');
    text.textContent = 'RUNNING';
  } else if (stateName === 'connecting') {
    badge.classList.add('connecting');
    text.textContent = 'CONNECTING';
  } else if (stateName === 'error') {
    badge.classList.add('error');
    text.textContent = 'ERROR';
  } else {
    text.textContent = 'IDLE';
  }
}

/* ───────────── Start/Stop ───────────── */
const btn = document.getElementById('btn-action');
const btnIcon = document.getElementById('btn-icon');
const btnText = document.getElementById('btn-text');
const chartLive = document.getElementById('chart-live');

function startMeasurement() {
  if (state.running) return;
  state.running = true;
  state.data = [];
  state.startTime = Date.now();
  kpiState = { now: 0, avg: 0, peak: 0, lat: null };

  setBadge('connecting');
  btn.classList.add('stop');
  btnIcon.textContent = '■';
  btnText.textContent = 'STOP';

  // disable controls
  document.querySelectorAll('.control-group').forEach(g => g.classList.add('disabled'));

  setTimeout(() => {
    setBadge('running');
    startPacketFlow();
    gsap.to(chartLive, { opacity: 1, duration: 0.4 });

    state.intervalId = setInterval(() => {
      const elapsed = (Date.now() - state.startTime) / 1000;
      const bw = generateBwSample(elapsed, state.config.bidir);
      const lat = generateLatSample();
      pushData(bw);
      updateKpis(bw, lat);

      if (elapsed >= state.config.duration) {
        stopMeasurement();
      }
    }, 100); // 10Hz
  }, 800); // simulate connection delay
}

function stopMeasurement() {
  if (!state.running) return;
  state.running = false;
  clearInterval(state.intervalId);
  state.intervalId = null;

  stopPacketFlow();
  setBadge('idle');
  btn.classList.remove('stop');
  btnIcon.textContent = '▶';
  btnText.textContent = 'START';
  gsap.to(chartLive, { opacity: 0, duration: 0.3 });

  document.querySelectorAll('.control-group').forEach(g => g.classList.remove('disabled'));
}

btn.addEventListener('click', () => {
  if (state.running) stopMeasurement(); else startMeasurement();
});

/* ───────────── Control dropdowns (mockup: just cycle values) ───────────── */
const toolValues = ['ib_write_bw', 'ib_read_lat', 'iperf3', 'mock'];
const sizeValues = ['64', '1K', '8K', '64K', '256K', '1M'];
const durationValues = [30, 60, 120, 300];

let toolIdx = 0, sizeIdx = 3, durationIdx = 1;

document.getElementById('cg-tool').addEventListener('click', () => {
  if (state.running) return;
  toolIdx = (toolIdx + 1) % toolValues.length;
  state.config.tool = toolValues[toolIdx];
  document.getElementById('val-tool').textContent = state.config.tool;
});
document.getElementById('cg-size').addEventListener('click', () => {
  if (state.running) return;
  sizeIdx = (sizeIdx + 1) % sizeValues.length;
  state.config.msgSize = sizeValues[sizeIdx];
  document.getElementById('val-size').textContent = state.config.msgSize;
});
document.getElementById('cg-duration').addEventListener('click', () => {
  if (state.running) return;
  durationIdx = (durationIdx + 1) % durationValues.length;
  state.config.duration = durationValues[durationIdx];
  document.getElementById('val-duration').textContent = `${state.config.duration}s`;
});
document.getElementById('cg-bidir').addEventListener('click', () => {
  if (state.running) return;
  setBidir(!state.config.bidir);
});

// 초기 상태 (단방향)
setBidir(false);

/* ───────────── Clock ───────────── */
function updateClock() {
  const d = new Date();
  const h = String(d.getHours()).padStart(2, '0');
  const m = String(d.getMinutes()).padStart(2, '0');
  const s = String(d.getSeconds()).padStart(2, '0');
  document.getElementById('clock').textContent = `${h}:${m}:${s}`;
}
updateClock();
setInterval(updateClock, 1000);

/* ───────────── Initial entrance animation ───────────── */
const tl = gsap.timeline();
tl.from('header', { y: -20, opacity: 0, duration: 0.4, ease: 'power2.out' })
  .from('.hardware', { y: 30, opacity: 0, duration: 0.5, ease: 'power3.out' }, '-=0.2')
  .from('.kpi .card', { y: 30, opacity: 0, duration: 0.4, stagger: 0.08, ease: 'power3.out' }, '-=0.3')
  .from('.chart-wrap', { y: 30, opacity: 0, duration: 0.5, ease: 'power3.out' }, '-=0.3')
  .from('.control', { y: 20, opacity: 0, duration: 0.4, ease: 'power2.out' }, '-=0.3')
  .from('footer', { y: 20, opacity: 0, duration: 0.3, ease: 'power2.out' }, '-=0.3');

/* ───────────── Keyboard shortcut: SPACE = start/stop ───────────── */
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (state.running) stopMeasurement(); else startMeasurement();
  }
});
</script>
