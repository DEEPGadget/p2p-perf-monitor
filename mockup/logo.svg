<?xml version="1.0" encoding="UTF-8"?>
<!--
  PLACEHOLDER LOGO (점선 박스로 명시)
  ───────────────────────────────────────
  실제 회사 로고를 받으면 본 SVG를 교체하거나 mockup/logo.png 를 사용:
    1) SVG: 본 파일을 새 SVG로 덮어쓰기 (height 40 기준 크기 권장)
    2) PNG: mockup/logo.png 파일 추가 + index.html 의 <img src="logo.svg"> 를
            <img src="logo.png"> 로 변경
  본 구현 시 frontend/static/logo.{svg,png} 로 이동.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 40" width="220" height="40">
  <rect x="1" y="1" width="218" height="38" rx="4"
        fill="none" stroke="#a1a1aa" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="110" y="25"
        font-family="-apple-system, 'Inter', monospace"
        font-size="11" font-weight="500" letter-spacing="0.2em"
        fill="#a1a1aa" text-anchor="middle">
    LOGO PLACEHOLDER
  </text>
</svg>
